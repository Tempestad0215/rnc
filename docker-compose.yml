services:
  app:
    image: tempestad/laravel-rnc:latest
    container_name: laravel-rnc
    env_file:
      - .env
    restart: unless-stopped

  webserver:
    image: nginx:alpine
    container_name: laravel-rnc-webserver
    ports:
      - "8083:80"
    depends_on:
      - app
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
